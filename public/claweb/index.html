<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLAWeb Entry</title>
  <link rel="stylesheet" href="/claweb/style.css?v=20260312-2" />
</head>
<body>
  <main class="app">
    <section id="login-panel" class="panel gate-panel">
      <header>
        <h1>Enter CLAWeb</h1>
        <p class="subtitle">Use your passphrase to restore the fixed session route.</p>
      </header>

      <div class="row">
        <label for="passphrase-input">Passphrase</label>
        <input id="passphrase-input" type="password" autocomplete="current-password" placeholder="Enter passphrase" />
      </div>

      <div class="actions single">
        <button id="login-btn" type="button">Continue</button>
      </div>

      <p id="login-error" class="error" role="status" aria-live="polite"></p>
    </section>

    <section id="chat-panel" class="panel hidden">
      <header class="topbar">
        <div>
          <h2>CLAWeb Chat</h2>
          <p id="session-desc" class="subtitle"></p>
        </div>
        <div class="topbar-actions">
          <button id="threads-btn" type="button" class="ghost">Threads</button>
          <div id="conn-status" class="status status-offline">Offline</div>
        </div>
      </header>

      <section id="threads-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-label="Threads">
          <header class="modal-header">
            <h3>Threads</h3>
            <button id="threads-close" type="button" class="ghost">Close</button>
          </header>
          <p class="subtitle">Switching thread will ask you to login for that identity.</p>
          <div id="threads-list" class="threads-list"></div>
        </div>
      </section>

      <section id="messages" class="messages" aria-live="polite"></section>

      <footer class="composer">
        <textarea id="message-input" rows="2" placeholder="Enter sends, Shift+Enter adds newline"></textarea>
        <button id="send-btn" type="button">Send</button>
      </footer>

      <div class="actions secondary">
        <button id="disconnect-btn" type="button" class="ghost">Disconnect</button>
        <button id="logout-btn" type="button" class="ghost">Logout</button>
      </div>
    </section>
  </main>

  <script src="/claweb/app.js?v=20260312-3"></script>
</body>
</html>
